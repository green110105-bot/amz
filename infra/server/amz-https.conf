# amz — force HTTPS. IP/:80 redirects to the HTTPS domain (except /health for
# internal/uptime probes). HTTPS serves the app on amz.cloudcut.fun via the
# existing *.cloudcut.fun wildcard certificate.

# --- HTTP :80 — redirect everything to HTTPS (keep /health for probes) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name amz.cloudcut.fun 47.97.252.71 _;

    # Allow internal/uptime health probes to stay on http.
    location = /health {
        proxy_pass http://127.0.0.1:8090/health;
        proxy_set_header Host $host;
    }
    # Everything else -> HTTPS on the canonical domain.
    location / {
        return 301 https://amz.cloudcut.fun$request_uri;
    }
}

# --- HTTPS :443 — the real app ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amz.cloudcut.fun;

    ssl_certificate /etc/letsencrypt/live/cloudcut.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudcut.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /var/www/amz-web;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8090/health;
        proxy_set_header Host $host;
    }
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
